<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scan Caliber Club or Cafe | Lake Erie Arms</title>
    <link rel="icon" href="../../images/logo.png" type="image/png">
    <link rel="stylesheet" href="../event.css">
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="brand" href="../"><img src="../../images/CC-Full-Logo-White-Gold.png" alt="Caliber Club"><span>Staff scanner</span></a>
        <a class="sheet-link" id="sheetLink" target="_blank" rel="noreferrer">Open tracker</a>
      </header>
      <section class="scanner-shell">
        <article class="station-card">
          <p class="eyebrow">Purchase station</p>
          <h1 id="stationTitle"></h1>
          <p id="stationSubtitle"></p>
          <strong id="stationChecklist"></strong>
          <div class="segmented" aria-label="Choose station">
            <button type="button" data-station-option="lea-cafe">LEA Cafe</button>
            <button type="button" data-station-option="caliber-club">Caliber Club</button>
          </div>
        </article>
        <section class="panel">
          <div class="reader"><video id="readerVideo" class="hide" autoplay muted playsinline></video><p class="reader-placeholder" id="readerPlaceholder">Starting camera...</p></div>
          <div class="form">
            <div class="field"><label for="manualGuestId">Guest ID backup</label><input id="manualGuestId" placeholder="LEA-260707-ABC123"></div>
            <button class="btn secondary" id="lookupButton" type="button">Look up guest</button>
            <div class="scan-result hide" id="scanResult"><strong id="resultName"></strong><span class="guest-id" id="resultGuestId"></span><span id="resultDetail"></span></div>
            <div class="field hide" id="purchaseField"><label for="purchaseAmount">Purchase amount</label><input id="purchaseAmount" type="number" min="0" step="0.01" inputmode="decimal"></div>
            <button class="btn gold" id="confirmButton" type="button" disabled>Confirm punch</button>
            <p class="status" id="scanStatus" role="status"></p>
          </div>
        </section>
      </section>
    </main>
    <script>window.LEA_STATION_ID = "caliber-club";</script>
    <script src="../config.js"></script><script src="../api.js"></script><script src="../station.js"></script>
  </body>
</html>
